<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ficha 3D&T Alpha Digital</title>
    <link rel="stylesheet" href="style.css">
    <script src="pericias.js"></script>
    <script src="vantagensUnicas.js"></script> ```
    
</head>
<body>
    <div class="ficha-container">
        <header>
            <h1>3D&T Alpha</h1>
            <div class="header-grid">
                <div class="input-group">
                    <label>NOME:</label>
                    <input type="text">
                </div>
                <div class="input-group">
                    <label>JOGADOR:</label>
                    <input type="text">
                </div>
                <div class="input-group highlight">
                    <label>PONTOS GASTOS:</label>
                    <span id="total-pontos">0</span>
                </div>
            </div>
        </header>

        <main>
            <section class="stats">
                <div class="stat-box">
                    <label>FORÇA</label>
                    <input type="number" value="0" min="0" class="attr-input">
                </div>
                <div class="stat-box">
                    <label>HABILIDADE</label>
                    <input type="number" value="0" min="0" class="attr-input">
                </div>
                <div class="stat-box">
                    <label>RESISTÊNCIA</label>
                    <input type="number" value="0" min="0" class="attr-input" id="res-input">
                </div>
                <div class="stat-box">
                    <label>ARMADURA</label>
                    <input type="number" value="0" min="0" class="attr-input">
                </div>
                <div class="stat-box">
                    <label>PODER DE FOGO</label>
                    <input type="number" value="0" min="0" class="attr-input">
                </div>
            </section>

            <section class="status-bars">
                <div class="bar-container">
                    <span class="bar-title">Pontos de Vida</span>
                    <div class="bar-wrapper">
                        <div id="pv-fill" class="bar-fill pv-color"></div>
                        <div class="bar-controls">
                            <button onclick="changeCurrent('pv', -5)">&laquo;</button>
                            <button onclick="changeCurrent('pv', -1)">&lsaquo;</button>
                            <span>
                             <input type="number" id="pv-current" value="5" min="0"> /
                             <span id="pv-max">5</span>
                            </span>
                            <button onclick="changeCurrent('pv', 1)">&rsaquo;</button>
                            <button onclick="changeCurrent('pv', 5)">&raquo;</button>
                        </div>
                    </div>
                </div>

                <div class="bar-container">
                    <span class="bar-title">Pontos de Mana</span>
                    <div class="bar-wrapper">
                        <div id="pm-fill" class="bar-fill pm-color"></div>
                        <div class="bar-controls">
                            <button onclick="changeCurrent('pm', -5)">&laquo;</button>
                            <button onclick="changeCurrent('pm', -1)">&lsaquo;</button>
                            <span>
                                <input type="number" id="pm-current" value="5" min="0"> /
                                <span id="pm-max">5</span>
                            </span>
                            <button onclick="changeCurrent('pm', 1)">&rsaquo;</button>
                            <button onclick="changeCurrent('pm', 5)">&raquo;</button>
                        </div>
                    </div>
                </div>
            </section>

            <section class="skills-container">
                <div class="skills-header">
                    <span class="header-name">PERÍCIA</span>
                    <span>TREINO</span>
                </div>
                <div class="skills-list" id="skills-list">
                    <script>
                        // Gera a lista usando os dados do pericias.js
                        listaPericias.forEach(p => {
                            document.write(`
                                <div class="skill-row">
                                    <div class="skill-name" onclick="showSkillDescription('${p}')">
                                        <span class="d20-icon">⬡</span> ${p}
                                    </div>
                                    <div class="skill-input training-val">
                                        <input type="number" value="0" min="0" max="2" oninput="updateAll()">
                                    </div>
                                </div>
                            `);
                        });
                    </script>
                </div>
            </section>

           <section class="info-grid">
                <div class="box">
                    <div class="box-header">
                        <label>Vantagens</label>
                        <button type="button" class="btn-add" onclick="addNewItem('vantagens-list')">+</button>
                    </div>
                    <div id="vantagens-list" class="dynamic-list"></div>
                </div>

                <div class="box">
                    <div class="box-header">
                        <label>Desvantagens</label>
                        <button type="button" class="btn-add" onclick="addNewItem('desvantagens-list')">+</button>
                    </div>
                    <div id="desvantagens-list" class="dynamic-list"></div>
                </div>

                <div class="box"><label>Tipo de Dano</label><input type="text"></div>
                <div class="box"><label>Magias Conhecidas</label><textarea rows="3"></textarea></div>
                
                <div class="flex-row">
                    <div class="box small"><label>Dinheiro</label><input type="number" value="0"></div>
                    <div class="box small"><label>Experiência</label><input type="number" value="0"></div>
                </div>
                <div class="box"><label>História</label><textarea rows="5"></textarea></div>

                <div class="box">
                    <label>Vantagem Única</label>
                    <select id="select-vantagem-unica" onchange="applyUniqueAdvantage()">
                        <option value="">Nenhuma / Humano</option>
                        </select>
                </div>

            </section>

    </div>

    <div id="skill-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Perícia</h2>
                <span class="close-btn" onclick="closeModal()">&times;</span>
            </div>
            <div id="modal-body" class="modal-body"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
